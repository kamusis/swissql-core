# SwissQL Backend Configuration Reference
#
# Copy relevant entries to /config/application.properties (mounted into the container)
# or set the corresponding environment variable. Environment variables take precedence.
#
# Spring Boot loads /config/application.properties automatically when
# SPRING_CONFIG_ADDITIONAL_LOCATION=optional:file:/config/ is set.

# ---------------------------------------------------------------------------
# Server
# ---------------------------------------------------------------------------

# HTTP port.
# Env: SWISSQL_SERVER_PORT
server.port=8080

# ---------------------------------------------------------------------------
# Data directory
# ---------------------------------------------------------------------------

# Directory for persistent data files: connections.json, credentials.json,
# sql-rules.yaml. Resolved in priority order:
#   1. SWISSQL_DATA_DIR env var
#   2. swissql.data-dir property (this file)
#   3. ./data (relative to backend working directory)
# Env: SWISSQL_DATA_DIR
#swissql.data-dir=/var/swissql/data

# Override path for the SQL rules file. When unset, defaults to
# <data-dir>/sql-rules.yaml.
#swissql.sql-rules-file=/var/swissql/data/sql-rules.yaml

# ---------------------------------------------------------------------------
# Connection pool (HikariCP, applied per database connection profile)
# ---------------------------------------------------------------------------

# Maximum number of connections per pool.
# Env: SWISSQL_POOL_MAX_SIZE
swissql.pool.max-size=5

# Minimum number of idle connections kept in each pool.
# Env: SWISSQL_POOL_MIN_IDLE
swissql.pool.min-idle=1

# Connection acquisition timeout in milliseconds.
# Env: SWISSQL_POOL_CONNECTION_TIMEOUT_MS
swissql.pool.connection-timeout-ms=5000

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------

# Application log level.
# Env: SWISSQL_LOG_LEVEL
logging.level.com.swissql=INFO

# Audit log level. Set to OFF to disable audit entries entirely.
# Env: SWISSQL_AUDIT_LOG_LEVEL
logging.level.com.swissql.audit=INFO

# Audit log output directory. When set, audit entries are written to a
# dedicated rolling file (<dir>/audit.log). When unset, audit entries go
# to stdout alongside the application log.
# Env: SWISSQL_AUDIT_LOG_DIR
#swissql.audit-log-dir=/var/log/swissql
