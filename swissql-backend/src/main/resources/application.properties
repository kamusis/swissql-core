spring.application.name=swissql-backend
spring.jackson.property-naming-strategy=SNAKE_CASE
logging.level.com.swissql=${SWISSQL_LOG_LEVEL:INFO}
logging.level.com.swissql.audit=${SWISSQL_AUDIT_LOG_LEVEL:INFO}

server.port=${SWISSQL_SERVER_PORT:8080}
swissql.pool.max-size=${SWISSQL_POOL_MAX_SIZE:5}
swissql.pool.min-idle=${SWISSQL_POOL_MIN_IDLE:1}
swissql.pool.connection-timeout-ms=${SWISSQL_POOL_CONNECTION_TIMEOUT_MS:5000}

# Audit log directory. When set, audit entries are written to a dedicated
# rolling file in this directory (audit.log). When unset, audit entries go
# to stdout with an [AUDIT] prefix alongside the application log.
swissql.audit-log-dir=${SWISSQL_AUDIT_LOG_DIR:}
